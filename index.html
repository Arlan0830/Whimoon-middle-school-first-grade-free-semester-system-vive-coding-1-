<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>좌표의 숲</title>
    <style>
        /* 어두운 미로 느낌의 고대비 다크 테마 스타일링 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #game-wrapper {
            background-color: #1e1e2f;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            padding: 20px;
            display: flex;
            gap: 20px;
        }

        #panel {
            display: flex;
            gap: 20px;
            position: relative;
        }

        #left {
            position: relative;
            border: 3px solid #555;
            border-radius: 10px;
            background-color: #111;
            overflow: hidden;
        }

        /* 게임 상황 알림 팝업 */
        #boss-warning, #stage-clear-popup, #level-clear-popup, #game-clear-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            display: none;
            z-index: 10;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #boss-warning { background-color: rgba(220, 53, 69, 0.9); }
        #stage-clear-popup { background-color: rgba(40, 167, 69, 0.9); }
        #level-clear-popup { background-color: rgba(0, 123, 255, 0.9); }
        #game-clear-popup { background-color: rgba(255, 193, 7, 0.9); color: #333; }

        #right {
            width: 300px;
            display: flex;
            flex-direction: column;
        }

        h1 { margin-top: 0; color: #81c784; font-size: 24px; text-shadow: 0 0 5px rgba(129, 199, 132, 0.5); }
        h2 { color: #ccc; font-size: 18px; border-bottom: 2px solid #444; padding-bottom: 10px; }

        .info-box {
            background-color: #2a2a40;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            line-height: 1.8;
            font-weight: bold;
            color: #ddd;
            border: 1px solid #444;
        }

        .info-box span { color: #64b5f6; }

        .question {
            background-color: #252538;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            border: 1px solid #444;
        }

        .formula {
            font-size: 28px;
            margin: 15px 0;
            color: #ff5252;
            text-shadow: 0 0 5px rgba(255, 82, 82, 0.3);
        }

        input[type="number"] {
            width: 80px;
            padding: 10px;
            font-size: 18px;
            text-align: center;
            background-color: #1a1a2e;
            color: #fff;
            border: 2px solid #64b5f6;
            border-radius: 5px;
            margin-right: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #1976d2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background-color: #115293; box-shadow: 0 0 10px #1976d2; }

        #message {
            margin-top: 15px;
            height: 20px;
            color: #ff5252;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="panel">
        <div id="left">
            <div id="boss-warning">⚠ 보스가 격렬하게 추격합니다!</div>
            <div id="stage-clear-popup">✨ 스테이지 클리어!</div>
            <div id="level-clear-popup">🌲 단계 완료!</div>
            <div id="game-clear-popup">👑 게임 클리어!</div>
            <canvas id="gameCanvas" width="760" height="680"></canvas>
        </div>

        <div id="right">
            <h1>🌲 좌표의 숲</h1>
            <h2 id="stageText">1단계 - 직선의 숲</h2>
            
            <div class="info-box">
                <div>현재 단계 : <span id="stageNum">1</span></div>
                <div>현재 스테이지 : <span id="subStage">1</span> / 4</div>
                <div>현재 위치 : <span id="currentPos">(0,0)</span></div>
                <div>목적지 : <span id="targetPos">(0,0)</span></div>
                <div>현재 문제 : <span id="questionNum">1</span> / 5</div>
                <div>남은 생명 : <span id="life">3</span></div>
                <div>현재 테마 : <span id="themeName" style="color: #81c784;">직선의 숲</span></div>
                <div>보스 상태 : <span id="bossStatus" style="color: #9e9e9e;">대기 중</span></div>
                <div>보스 속도 : <span id="bossSpeedText" style="color: #ff5252;">-</span></div>
            </div>

            <div class="question">
                <div>빈칸의 상수를 구하세요!</div>
                <div id="formulaText" class="formula"> y = □x</div>
                <input type="number" step="0.1" id="answerInput" autocomplete="off">
                <button id="submitBtn">이동하기</button>
                <div id="message"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const gridSize = 40;
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    // 테마 설정 (가시성이 확보된 어두운 미로 테마)
    const themes = [
        { name: "직선의 숲", bgColor: "#14251c", decorColor: "#81c784", type: "tree" },     
        { name: "기울기의 협곡", bgColor: "#2d1f18", decorColor: "#ffb74d", type: "rock" },   
        { name: "함수의 늪", bgColor: "#152332", decorColor: "#4dd0e1", type: "rock" },     
        { name: "절편의 유적", bgColor: "#251632", decorColor: "#ba68c8", type: "tree" }     
    ];

    let state = {
        level: 1,
        stage: 1,
        question: 1,
        life: 3,
        playerPos: { x: 0, y: 0 },
        targetPos: { x: 0, y: 0 },
        bossPos: { x: -8, y: -8 },
        bossSpeed: 1.0, // 보스의 이동 속도 변수
        answer: 0,
        isGameOver: false,
        decors: [] 
    };

    const ui = {
        stageText: document.getElementById('stageText'),
        stageNum: document.getElementById('stageNum'),
        subStage: document.getElementById('subStage'),
        currentPos: document.getElementById('currentPos'),
        targetPos: document.getElementById('targetPos'),
        questionNum: document.getElementById('questionNum'),
        life: document.getElementById('life'),
        formulaText: document.getElementById('formulaText'),
        answerInput: document.getElementById('answerInput'),
        message: document.getElementById('message'),
        themeName: document.getElementById('themeName'),
        bossStatus: document.getElementById('bossStatus'),
        bossSpeedText: document.getElementById('bossSpeedText')
    };

    function init() {
        generateDecors();
        generateQuestion();
        drawCanvas();
    }

    function generateDecors() {
        state.decors = [];
        for (let i = 0; i < 45; i++) {
            let dx = Math.floor(Math.random() * 18) - 9;
            let dy = Math.floor(Math.random() * 16) - 8;
            if (Math.abs(dx) < 2 && Math.abs(dy) < 2) continue; 
            state.decors.push({ x: dx, y: dy });
        }
    }

    // 수학적 좌표평면 알고리즘 (+X 우측, +Y 상단)
    function toCanvas(x, y) {
        return {
            cx: centerX + x * gridSize,
            cy: centerY - y * gridSize
        };
    }

    function generateQuestion() {
        state.playerPos = { ...state.targetPos };
        
        let dx, dy, targetX, targetY;
        
        do {
            const dxChoices = [1, 2, -1, -2]; 
            dx = dxChoices[Math.floor(Math.random() * dxChoices.length)];
            dy = Math.floor(Math.random() * 9) - 4; 
            
            targetX = state.playerPos.x + dx;
            targetY = state.playerPos.y + dy;
            
        } while (targetX < -8 || targetX > 8 || targetY < -7 || targetY > 7);

        state.targetPos = { x: targetX, y: targetY };
        state.answer = dy / dx;
        
        let b = state.playerPos.y - (state.answer * state.playerPos.x);
        
        let bText = "";
        if (b > 0) {
            bText = ` + ${b.toFixed(1).replace('.0', '')}`;
        } else if (b < 0) {
            bText = ` - ${Math.abs(b).toFixed(1).replace('.0', '')}`;
        }

        ui.formulaText.innerText = `y = □x${bText}`;
        updateUI();
    }

    function updateUI() {
        let currentTheme = themes[(state.level - 1) % themes.length];
        ui.stageText.innerText = `${state.level}단계 - ${currentTheme.name}`;
        ui.themeName.innerText = currentTheme.name;
        
        ui.stageNum.innerText = state.level;
        ui.subStage.innerText = state.stage;
        ui.questionNum.innerText = state.question;
        ui.life.innerText = state.life;
        ui.currentPos.innerText = `(${state.playerPos.x}, ${state.playerPos.y})`;
        ui.targetPos.innerText = `(${state.targetPos.x}, ${state.targetPos.y})`;
        
        if (state.stage === 4) {
            ui.bossSpeedText.innerText = state.bossSpeed.toFixed(1);
            let bossDist = Math.sqrt(Math.pow(state.playerPos.x - state.bossPos.x, 2) + Math.pow(state.playerPos.y - state.bossPos.y, 2));
            if (bossDist < 2.5) {
                ui.bossStatus.innerText = "위험! 바로 뒤에 있음!";
                ui.bossStatus.style.color = "#ff5252";
            } else {
                ui.bossStatus.innerText = "추격 중...";
                ui.bossStatus.style.color = "#ffb74d";
            }
        } else {
            ui.bossStatus.innerText = "대기 중";
            ui.bossStatus.style.color = "#9e9e9e";
            ui.bossSpeedText.innerText = "-";
        }
    }

    // 보스 추격 알고리즘 (벡터 추적 방식 및 충돌 체크)
    function chasePlayer() {
        let dx = state.playerPos.x - state.bossPos.x;
        let dy = state.playerPos.y - state.bossPos.y;
        let dist = Math.sqrt(dx * dx + dy * dy);

        if (dist > 0.1) {
            // 플레이어 방향 벡터 구하기 후 속도만큼 전진
            state.bossPos.x += (dx / dist) * state.bossSpeed;
            state.bossPos.y += (dy / dist) * state.bossSpeed;
        }

        // 이동 후 플레이어와 완전히 충돌했는지 최종 판정
        let finalDist = Math.sqrt(Math.pow(state.playerPos.x - state.bossPos.x, 2) + Math.pow(state.playerPos.y - state.bossPos.y, 2));
        if (finalDist < 0.7) {
            drawCanvas();
            alert("보스에게 붙잡혔습니다! 게임 오버!");
            state.isGameOver = true;
        }
    }

    function drawCanvas() {
        let currentTheme = themes[(state.level - 1) % themes.length];

        // 1. 기본 배경
        ctx.fillStyle = currentTheme.bgColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. 좌표선 및 격자 그리드
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.12)'; 
        ctx.lineWidth = 1;
        for (let i = 0; i <= canvas.width; i += gridSize) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for (let i = 0; i <= canvas.height; i += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        // 중심 축 (X축, Y축)
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height); ctx.stroke();

        // ★ [기능 추가] 실제 좌표평면과 완벽 일치하는 격자 숫자 텍스트 그리기
        ctx.fillStyle = "rgba(255, 255, 255, 0.6)";
        ctx.font = "bold 11px Arial";
        
        // X축 숫자 라벨
        for (let x = -9; x <= 9; x++) {
            if (x === 0) continue;
            let px = toCanvas(x, 0);
            ctx.fillText(x, px.cx - 5, centerY + 16);
        }
        // Y축 숫자 라벨
        for (let y = -8; y <= 8; y++) {
            if (y === 0) continue;
            let px = toCanvas(0, y);
            ctx.fillText(y, centerX + 8, px.cy + 4);
        }

        // 3. 지형지물 배치
        ctx.fillStyle = currentTheme.decorColor;
        state.decors.forEach(decor => {
            let px = toCanvas(decor.x, decor.y);
            if (currentTheme.type === "tree") {
                ctx.beginPath();
                ctx.moveTo(px.cx, px.cy - 12);
                ctx.lineTo(px.cx - 10, px.cy + 10);
                ctx.lineTo(px.cx + 10, px.cy + 10);
                ctx.fill();
            } else {
                ctx.beginPath();
                ctx.arc(px.cx, px.cy, 9, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        // 4. 경로 점선
        let targetPx = toCanvas(state.targetPos.x, state.targetPos.y);
        let playerPx = toCanvas(state.playerPos.x, state.playerPos.y);
        
        ctx.strokeStyle = 'rgba(100, 181, 246, 0.6)';
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(playerPx.cx, playerPx.cy);
        ctx.lineTo(targetPx.cx, targetPx.cy);
        ctx.stroke();
        ctx.setLineDash([]); 

        // 5. 목적지 노란 구체
        ctx.fillStyle = '#ffee58';
        ctx.beginPath(); ctx.arc(targetPx.cx, targetPx.cy, 9, 0, Math.PI * 2); ctx.fill();

        // 6. 플레이어 네온 블루 구체
        ctx.fillStyle = '#00e5ff';
        ctx.shadowBlur = 12;
        ctx.shadowColor = '#00e5ff';
        ctx.beginPath(); ctx.arc(playerPx.cx, playerPx.cy, 12, 0, Math.PI * 2); ctx.fill();
        ctx.shadowBlur = 0; 

        // 7. 보스 레드 스퀘어 (4스테이지 헬 하운드)
        if (state.stage === 4) {
            let bossPx = toCanvas(state.bossPos.x, state.bossPos.y);
            ctx.fillStyle = '#ff1744';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff1744';
            ctx.fillRect(bossPx.cx - 15, bossPx.cy - 15, 30, 30);
            ctx.shadowBlur = 0;
        }
    }

    function showPopup(id) {
        const popup = document.getElementById(id);
        popup.style.display = 'block';
        setTimeout(() => { popup.style.display = 'none'; }, 2000);
    }

    // 이동/제출 버튼 로직
    document.getElementById('submitBtn').addEventListener('click', () => {
        if (state.isGameOver) return;

        let userAnswer = parseFloat(ui.answerInput.value);
        if (isNaN(userAnswer)) {
            ui.message.innerText = "숫자를 입력해주세요!";
            return;
        }

        // 1. 정답을 맞춘 경우
        if (Math.abs(userAnswer - state.answer) < 0.05) {
            ui.message.innerText = "정답입니다!";
            ui.message.style.color = "#4caf50";
            ui.answerInput.value = '';

            // 4스테이지 보스전 진행 중이라면 정답 시 보스 속도 1 감소 (최소 0.4 보장)
            if (state.stage === 4) {
                state.bossSpeed = Math.max(0.4, state.bossSpeed - 1.0);
                chasePlayer(); // 정답 처리 후 느려진 속도로 플레이어 추격
            }

            if (state.isGameOver) return;

            state.question++;
            if (state.question > 5) {
                state.question = 1;
                state.stage++;
                showPopup('stage-clear-popup');
                
                // ★ [기능 추가] 4스테이지 보스전 진입 즉시 플레이어의 '원점 대칭 위치'에서 스폰
                if (state.stage === 4) {
                    state.bossPos = { 
                        x: -state.playerPos.x, 
                        y: -state.playerPos.y 
                    };
                    // 만약 원점 대칭 좌표가 플레이어와 너무 가깝다면 안전거리 강제 패치
                    if (Math.abs(state.bossPos.x - state.playerPos.x) < 3 && Math.abs(state.bossPos.y - state.playerPos.y) < 3) {
                        state.bossPos = { x: -7, y: -6 }; 
                    }
                    state.bossSpeed = 1.0; // 보스 기본 초기 속도 세팅
                }

                if (state.stage > 4) {
                    state.stage = 1;
                    state.level++;
                    generateDecors(); 
                    showPopup('level-clear-popup');
                }
            }
            generateQuestion();

        // 2. 오답인 경우
        } else {
            state.life--;
            
            // 4스테이지 보스전 진행 중 오답 시 보스 속도 1 증가 및 추격 가속화
            if (state.stage === 4) {
                state.bossSpeed += 1.0;
                ui.message.innerText = "오답입니다! 보스의 이동 속도가 상승하며 돌진합니다!";
                ui.message.style.color = "#ff5252";
                showPopup('boss-warning');
                chasePlayer(); // 가속된 속도로 플레이어 급습
            } else {
                ui.message.innerText = "오답입니다! 생명이 감소했습니다.";
                ui.message.style.color = "#ffb74d";
            }

            if (state.life <= 0) {
                alert("생명을 모두 잃었습니다. 게임 오버!");
                state.isGameOver = true;
                return;
            }
        }
        
        updateUI();
        drawCanvas();
    });

    ui.answerInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            document.getElementById('submitBtn').click();
        }
    });

    init();
</script>

</body>
</html>
