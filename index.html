<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>좌표의 숲</title>
    <style>
        /* 어두운 미로 느낌의 다크 테마 스타일링 */
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #game-wrapper {
            background-color: #1e1e2f;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
            padding: 20px;
            display: flex;
            gap: 20px;
        }

        #panel {
            display: flex;
            gap: 20px;
            position: relative;
        }

        #left {
            position: relative;
            border: 3px solid #444;
            border-radius: 10px;
            background-color: #000;
            overflow: hidden;
        }

        /* 게임 상황 알림 팝업 */
        #boss-warning, #stage-clear-popup, #level-clear-popup, #game-clear-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            display: none;
            z-index: 10;
            text-align: center;
            box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }

        #boss-warning { background-color: rgba(220, 53, 69, 0.9); }
        #stage-clear-popup { background-color: rgba(40, 167, 69, 0.9); }
        #level-clear-popup { background-color: rgba(0, 123, 255, 0.9); }
        #game-clear-popup { background-color: rgba(255, 193, 7, 0.9); color: #333; }

        #right {
            width: 300px;
            display: flex;
            flex-direction: column;
        }

        h1 { margin-top: 0; color: #4caf50; font-size: 24px; text-shadow: 0 0 5px rgba(76, 175, 80, 0.5); }
        h2 { color: #aaa; font-size: 18px; border-bottom: 2px solid #444; padding-bottom: 10px; }

        .info-box {
            background-color: #2a2a40;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            line-height: 1.8;
            font-weight: bold;
            color: #ddd;
            border: 1px solid #444;
        }

        .info-box span { color: #64b5f6; }

        .question {
            background-color: #252538;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            border: 1px solid #444;
        }

        .formula {
            font-size: 28px;
            margin: 15px 0;
            color: #ff5252;
            text-shadow: 0 0 5px rgba(255, 82, 82, 0.3);
        }

        input[type="number"] {
            width: 80px;
            padding: 10px;
            font-size: 18px;
            text-align: center;
            background-color: #1a1a2e;
            color: #fff;
            border: 2px solid #64b5f6;
            border-radius: 5px;
            margin-right: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #1976d2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background-color: #115293; box-shadow: 0 0 10px #1976d2; }

        #message {
            margin-top: 15px;
            height: 20px;
            color: #ff5252;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="panel">
        <div id="left">
            <div id="boss-warning">⚠ 보스가 추격 중입니다!</div>
            <div id="stage-clear-popup">✨ 스테이지 클리어!</div>
            <div id="level-clear-popup">🌲 단계 완료!</div>
            <div id="game-clear-popup">👑 게임 클리어!</div>
            <canvas id="gameCanvas" width="760" height="680"></canvas>
        </div>

        <div id="right">
            <h1>🌲 좌표의 숲</h1>
            <h2 id="stageText">1단계 - 직선의 숲</h2>
            
            <div class="info-box">
                <div>현재 단계 : <span id="stageNum">1</span></div>
                <div>현재 스테이지 : <span id="subStage">1</span> / 4</div>
                <div>현재 위치 : <span id="currentPos">(0,0)</span></div>
                <div>목적지 : <span id="targetPos">(0,0)</span></div>
                <div>현재 문제 : <span id="questionNum">1</span> / 5</div>
                <div>남은 생명 : <span id="life">3</span></div>
                <div>현재 테마 : <span id="themeName" style="color: #81c784;">직선의 숲</span></div>
                <div>보스 상태 : <span id="bossStatus" style="color: #9e9e9e;">대기 중</span></div>
            </div>

            <div class="question">
                <div>빈칸의 상수를 구하세요!</div>
                <div id="formulaText" class="formula"> y = □x</div>
                <input type="number" step="0.1" id="answerInput" autocomplete="off">
                <button id="submitBtn">이동하기</button>
                <div id="message"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const gridSize = 40;
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    // 테마 설정 (단계에 맞는 분위기 연출)
    const themes = [
        { name: "직선의 숲", bgColor: "#0f1c13", decorColor: "#2e7d32", type: "tree" },     // 1단계
        { name: "기울기의 협곡", bgColor: "#241610", decorColor: "#795548", type: "rock" },   // 2단계
        { name: "함수의 늪", bgColor: "#101924", decorColor: "#455a64", type: "rock" },     // 3단계
        { name: "절편의 유적", bgColor: "#1d1024", decorColor: "#673ab7", type: "tree" }     // 4단계
    ];

    let state = {
        level: 1,
        stage: 1,
        question: 1,
        life: 3,
        playerPos: { x: 0, y: 0 },
        targetPos: { x: 0, y: 0 },
        bossPos: { x: -8, y: -8 },
        answer: 0,
        isGameOver: false,
        decors: [] 
    };

    const ui = {
        stageText: document.getElementById('stageText'),
        stageNum: document.getElementById('stageNum'),
        subStage: document.getElementById('subStage'),
        currentPos: document.getElementById('currentPos'),
        targetPos: document.getElementById('targetPos'),
        questionNum: document.getElementById('questionNum'),
        life: document.getElementById('life'),
        formulaText: document.getElementById('formulaText'),
        answerInput: document.getElementById('answerInput'),
        message: document.getElementById('message'),
        themeName: document.getElementById('themeName'),
        bossStatus: document.getElementById('bossStatus')
    };

    // 게임 시작 초기화
    function init() {
        generateDecors();
        generateQuestion();
        drawCanvas();
    }

    // 미로/지형 장식물 무작위 배치
    function generateDecors() {
        state.decors = [];
        for (let i = 0; i < 45; i++) {
            let dx = Math.floor(Math.random() * 18) - 9;
            let dy = Math.floor(Math.random() * 16) - 8;
            if (Math.abs(dx) < 2 && Math.abs(dy) < 2) continue; // 시작점 주변 비우기
            state.decors.push({ x: dx, y: dy });
        }
    }

    // 게임 좌표계를 캔버스 픽셀 좌표로 변환
    function toCanvas(x, y) {
        return {
            cx: centerX + x * gridSize,
            cy: centerY - y * gridSize
        };
    }

    // 문제 생성 (화면 이탈 방지 로직 적용!)
    function generateQuestion() {
        state.playerPos = { ...state.targetPos };
        
        let dx, dy, targetX, targetY;
        
        // 목적지가 캔버스 화면 크기 안쪽(-8~8, -7~7)에만 위치하도록 제한
        do {
            const dxChoices = [1, 2, -1, -2]; // 답이 깔끔하게 떨어지도록 설정
            dx = dxChoices[Math.floor(Math.random() * dxChoices.length)];
            dy = Math.floor(Math.random() * 9) - 4; // -4 ~ +4
            
            targetX = state.playerPos.x + dx;
            targetY = state.playerPos.y + dy;
            
        } while (targetX < -8 || targetX > 8 || targetY < -7 || targetY > 7);

        state.targetPos = { x: targetX, y: targetY };
        state.answer = dy / dx;
        
        // y = ax + b 공식에서 b(절편) 구하기
        let b = state.playerPos.y - (state.answer * state.playerPos.x);
        
        let bText = "";
        if (b > 0) {
            bText = ` + ${b.toFixed(1).replace('.0', '')}`;
        } else if (b < 0) {
            bText = ` - ${Math.abs(b).toFixed(1).replace('.0', '')}`;
        }

        ui.formulaText.innerText = `y = □x${bText}`;
        updateUI();
    }

    // 우측 정보창 UI 및 보스 상태 갱신
    function updateUI() {
        let currentTheme = themes[(state.level - 1) % themes.length];
        ui.stageText.innerText = `${state.level}단계 - ${currentTheme.name}`;
        ui.themeName.innerText = currentTheme.name;
        
        ui.stageNum.innerText = state.level;
        ui.subStage.innerText = state.stage;
        ui.questionNum.innerText = state.question;
        ui.life.innerText = state.life;
        ui.currentPos.innerText = `(${state.playerPos.x}, ${state.playerPos.y})`;
        ui.targetPos.innerText = `(${state.targetPos.x}, ${state.targetPos.y})`;
        
        // 4스테이지(보스전)에서만 보스 활성화 활성
        if (state.stage === 4) {
            let bossDist = Math.sqrt(Math.pow(state.playerPos.x - state.bossPos.x, 2) + Math.pow(state.playerPos.y - state.bossPos.y, 2));
            if (bossDist < 3) {
                ui.bossStatus.innerText = "위험! 근접함!";
                ui.bossStatus.style.color = "#ff5252";
            } else {
                ui.bossStatus.innerText = "추격 중...";
                ui.bossStatus.style.color = "#ffb74d";
            }
        } else {
            ui.bossStatus.innerText = "대기 중";
            ui.bossStatus.style.color = "#9e9e9e";
        }
    }

    // 그래픽 드로잉
    function drawCanvas() {
        let currentTheme = themes[(state.level - 1) % themes.length];

        // 1. 맵 기본 배경색
        ctx.fillStyle = currentTheme.bgColor;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 2. 어두운 눈금 격자선
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.lineWidth = 1;
        for (let i = 0; i <= canvas.width; i += gridSize) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for (let i = 0; i <= canvas.height; i += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        // 기준 축 (X축, Y축)
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height); ctx.stroke();

        // 3. 지형지물 (미로 분위기 장식물) 그리기
        ctx.fillStyle = currentTheme.decorColor;
        state.decors.forEach(decor => {
            let px = toCanvas(decor.x, decor.y);
            if (currentTheme.type === "tree") {
                // 나무 형태 (삼각형 모양)
                ctx.beginPath();
                ctx.moveTo(px.cx, px.cy - 12);
                ctx.lineTo(px.cx - 10, px.cy + 10);
                ctx.lineTo(px.cx + 10, px.cy + 10);
                ctx.fill();
            } else {
                // 협곡 바위 형태 (다각형 원 모양)
                ctx.beginPath();
                ctx.arc(px.cx, px.cy, 9, 0, Math.PI * 2);
                ctx.fill();
            }
        });

        // 4. 이동 궤적 예측선 (점선)
        let targetPx = toCanvas(state.targetPos.x, state.targetPos.y);
        let playerPx = toCanvas(state.playerPos.x, state.playerPos.y);
        
        ctx.strokeStyle = 'rgba(100, 181, 246, 0.4)';
        ctx
