<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>좌표의 숲</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f0f8ff;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        #game-wrapper {
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            padding: 20px;
            display: flex;
            gap: 20px;
        }

        #panel {
            display: flex;
            gap: 20px;
            position: relative;
        }

        #left {
            position: relative;
            border: 2px solid #333;
            border-radius: 10px;
            background-color: #e8f5e9;
            overflow: hidden;
        }

        /* 팝업 UI 스타일 */
        #boss-warning, #stage-clear-popup, #level-clear-popup, #game-clear-popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 20px 40px;
            border-radius: 10px;
            font-size: 24px;
            font-weight: bold;
            color: white;
            display: none;
            z-index: 10;
            text-align: center;
        }

        #boss-warning { background-color: rgba(220, 53, 69, 0.9); }
        #stage-clear-popup { background-color: rgba(40, 167, 69, 0.9); }
        #level-clear-popup { background-color: rgba(0, 123, 255, 0.9); }
        #game-clear-popup { background-color: rgba(255, 193, 7, 0.9); color: #333; }

        #right {
            width: 300px;
            display: flex;
            flex-direction: column;
        }

        h1 { margin-top: 0; color: #2e7d32; font-size: 24px; }
        h2 { color: #555; font-size: 18px; border-bottom: 2px solid #ccc; padding-bottom: 10px; }

        .info-box {
            background-color: #f1f8e9;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            line-height: 1.8;
            font-weight: bold;
            color: #333;
        }

        .info-box span { color: #1565c0; }

        .question {
            background-color: #e3f2fd;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .formula {
            font-size: 28px;
            margin: 15px 0;
            color: #c62828;
        }

        input[type="number"] {
            width: 80px;
            padding: 10px;
            font-size: 18px;
            text-align: center;
            border: 2px solid #90caf9;
            border-radius: 5px;
            margin-right: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #1976d2;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { background-color: #115293; }

        #message {
            margin-top: 15px;
            height: 20px;
            color: #d32f2f;
        }
    </style>
</head>
<body>

<div id="game-wrapper">
    <div id="panel">
        <div id="left">
            <div id="boss-warning">⚠ 보스가 추격 중입니다!</div>
            <div id="stage-clear-popup">✨ 스테이지 클리어!</div>
            <div id="level-clear-popup">🌲 단계 완료!</div>
            <div id="game-clear-popup">👑 게임 클리어!</div>
            <canvas id="gameCanvas" width="760" height="680"></canvas>
        </div>

        <div id="right">
            <h1>🌲 좌표의 숲</h1>
            <h2 id="stageText">1단계 - 직선의 숲</h2>
            
            <div class="info-box">
                <div>현재 단계 : <span id="stageNum">1</span></div>
                <div>현재 스테이지 : <span id="subStage">1</span> / 4</div>
                <div>현재 위치 : <span id="currentPos">(0,0)</span></div>
                <div>목적지 : <span id="targetPos">(0,0)</span></div>
                <div>현재 문제 : <span id="questionNum">1</span> / 5</div>
                <div>남은 생명 : <span id="life">3</span></div>
                <div>현재 테마 : <span id="themeName">직선의 숲</span></div>
                <div>보스 상태 : <span id="bossStatus">대기 중</span></div>
            </div>

            <div class="question">
                <div>빈칸의 상수를 구하세요!</div>
                <div id="formulaText" class="formula"> y = □x</div>
                <input type="number" step="0.1" id="answerInput">
                <button id="submitBtn">이동하기</button>
                <div id="message"></div>
                <div id="answer-result"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // 캔버스 및 Context 설정
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // 게임 설정
    const gridSize = 40; // 격자 한 칸의 픽셀 크기
    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    // 게임 상태 변수
    let state = {
        level: 1,
        stage: 1,
        question: 1,
        life: 3,
        playerPos: { x: 0, y: 0 },
        targetPos: { x: 0, y: 0 },
        bossPos: { x: -10, y: -10 },
        answer: 0,
        isGameOver: false
    };

    // DOM 요소 캐싱
    const ui = {
        stageNum: document.getElementById('stageNum'),
        subStage: document.getElementById('subStage'),
        currentPos: document.getElementById('currentPos'),
        targetPos: document.getElementById('targetPos'),
        questionNum: document.getElementById('questionNum'),
        life: document.getElementById('life'),
        formulaText: document.getElementById('formulaText'),
        answerInput: document.getElementById('answerInput'),
        message: document.getElementById('message'),
        bossStatus: document.getElementById('bossStatus')
    };

    // 게임 초기화 및 시작
    function init() {
        generateQuestion();
        drawCanvas();
    }

    // 좌표를 캔버스 픽셀로 변환
    function toCanvas(x, y) {
        return {
            cx: centerX + x * gridSize,
            cy: centerY - y * gridSize // y축은 위로 갈수록 증가하므로 빼줌
        };
    }

    // 문제 생성 로직 (기울기 구하기)
    function generateQuestion() {
        // 현재 위치를 타겟 위치로 갱신 (첫 시작 제외)
        state.playerPos = { ...state.targetPos };
        
        // 새로운 타겟 좌표 생성 (현재 위치 기준 X축으로 1~3, Y축으로 랜덤 이동)
        let dx = Math.floor(Math.random() * 3) + 1; 
        let dy = Math.floor(Math.random() * 7) - 3; // -3 ~ +3
        
        state.targetPos = {
            x: state.playerPos.x + dx,
            y: state.playerPos.y + dy
        };

        // 정답(기울기) 계산: (y2 - y1) / (x2 - x1)
        state.answer = dy / dx;
        
        // y절편(b) 계산: y = ax + b -> b = y - ax
        let b = state.playerPos.y - (state.answer * state.playerPos.x);
        
        // 수식 텍스트 만들기
        let bText = "";
        if (b > 0) bText = ` + ${b.toFixed(1)}`;
        else if (b < 0) bText = ` - ${Math.abs(b).toFixed(1)}`;

        ui.formulaText.innerText = `y = □x${bText}`;

        updateUI();
    }

    // UI 업데이트
    function updateUI() {
        ui.stageNum.innerText = state.level;
        ui.subStage.innerText = state.stage;
        ui.questionNum.innerText = state.question;
        ui.life.innerText = state.life;
        ui.currentPos.innerText = `(${state.playerPos.x}, ${state.playerPos.y})`;
        ui.targetPos.innerText = `(${state.targetPos.x}, ${state.targetPos.y})`;
        
        // 보스 거리 계산
        let bossDist = Math.sqrt(Math.pow(state.playerPos.x - state.bossPos.x, 2) + Math.pow(state.playerPos.y - state.bossPos.y, 2));
        if (bossDist < 3) {
            ui.bossStatus.innerText = "위험! 접근 중!";
            ui.bossStatus.style.color = "red";
        } else {
            ui.bossStatus.innerText = "추격 중...";
            ui.bossStatus.style.color = "black";
        }
    }

    // 화면 그리기
    function drawCanvas() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 격자 및 축 그리기
        ctx.strokeStyle = '#e0e0e0';
        ctx.lineWidth = 1;
        for (let i = 0; i <= canvas.width; i += gridSize) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for (let i = 0; i <= canvas.height; i += gridSize) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        // X축, Y축 강조
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(centerX, 0); ctx.lineTo(centerX, canvas.height); ctx.stroke();

        // 2. 보스 그리기 (빨간색 사각형)
        let bossPx = toCanvas(state.bossPos.x, state.bossPos.y);
        ctx.fillStyle = '#d32f2f';
        ctx.fillRect(bossPx.cx - 15, bossPx.cy - 15, 30, 30);
        
        // 3. 목적지 그리기 (노란색 별/원)
        let targetPx = toCanvas(state.targetPos.x, state.targetPos.y);
        ctx.fillStyle = '#fbc02d';
        ctx.beginPath();
        ctx.arc(targetPx.cx, targetPx.cy, 10, 0, Math.PI * 2);
        ctx.fill();

        // 4. 플레이어 그리기 (파란색 원)
        let playerPx = toCanvas(state.playerPos.x, state.playerPos.y);
        ctx.fillStyle = '#1976d2';
        ctx.beginPath();
        ctx.arc(playerPx.cx, playerPx.cy, 12, 0, Math.PI * 2);
        ctx.fill();

        // 경로선 (점선)
        ctx.strokeStyle = 'rgba(25, 118, 210, 0.5)';
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(playerPx.cx, playerPx.cy);
        ctx.lineTo(targetPx.cx, targetPx.cy);
        ctx.stroke();
        ctx.setLineDash([]); // 초기화
    }

    // 팝업 표시 함수
    function showPopup(id) {
        const popup = document.getElementById(id);
        popup.style.display = 'block';
        setTimeout(() => { popup.style.display = 'none'; }, 2000);
    }

    // 정답 제출 이벤트
    document.getElementById('submitBtn').addEventListener('click', () => {
        if (state.isGameOver) return;

        let userAnswer = parseFloat(ui.answerInput.value);
        if (isNaN(userAnswer)) {
            ui.message.innerText = "숫자를 입력해주세요!";
            return;
        }

        // 오차 허용 (0.1 단위)
        if (Math.abs(userAnswer - state.answer) < 0.05) {
            ui.message.innerText = "정답입니다! 다음으로 이동합니다.";
            ui.message.style.color = "green";
            ui.answerInput.value = '';

            state.question++;
            if (state.question > 5) {
                state.question = 1;
                state.stage++;
                showPopup('stage-clear-popup');
                
                if (state.stage > 4) {
                    state.stage = 1;
                    state.level++;
                    showPopup('level-clear-popup');
                }
            }
            generateQuestion();
        } else {
            ui.message.innerText = "오답입니다! 생명이 감소하고 보스가 다가옵니다!";
            ui.message.style.color = "red";
            state.life--;
            
            // 오답 시 보스가 플레이어 쪽으로 절반만큼 다가옴
            state.bossPos.x += (state.playerPos.x - state.bossPos.x) / 2;
            state.bossPos.y += (state.playerPos.y - state.bossPos.y) / 2;
            
            showPopup('boss-warning');

            if (state.life <= 0) {
                alert("생명을 모두 잃었습니다. 게임 오버!");
                state.isGameOver = true;
                return;
            }
        }
        
        updateUI();
        drawCanvas();
    });

    // Enter 키로 제출 가능하게 설정
    ui.answerInput.addEventListener('keypress', function (e) {
        if (e.key === 'Enter') {
            document.getElementById('submitBtn').click();
        }
    });

    // 게임 시작
    init();
</script>

</body>
</html>
